<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color:#eeeeee;
        }
        .container{
            background-color:white;
            text-align:center;
            border-radius:20px;
            padding:10px;
            width:400px;
            margin:auto;
        }
        .row{
            display: flex;
            justify-content: center;
        }
        .title{
            font-size:30px;
            margin-top:30px;
        }
        .header{
            font-size:60px;
            color:blue;
            font-weight:bold;
            font-family:verdana;
        }
        .caption{
            font-size:20px;
            color:grey;
        }
        input,select,gender{
            width:100%;
            border-radius: 5px;
            margin:5px;
            padding:5px;
            border:1px solid gray;
        }
        button{
            color:white;
            background-color: green;
            font-size: 20px;
            padding: 10px;
            border-radius:20px;
        }
        .leftCaption{
            color:gray;
            margin-left:5px;
            font-size:10px;
        }
            
    </style>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="header" >facebook</div>

        </div>
        <div class="row">
            <div>
            <div class="title">
                Create a new account
            </div>
            <div class="caption">
                It's quick and easy
            </div>
            </div>
        </div>

        <div class="row">
            <input type="text" placeholder="enter name">
            <input type="text" placeholder="enter surname">

        </div>
        <div class="row" style="justify-content:start">
            <div class="leftCaption" >Date of Birth</div>
        </div>
        <div class="row">
            <select id="day"></select>
            <select id="month"></select>
            <select id="year"></select>
        </div>
        <div class="row" style="justify-content:start">
            <div class="leftCaption">Gender</div>
            </div>
            <div class="row">
            <input type="radio" id="gender" name="Male"/>Male<input type="radio" id="gender" name="Female"/>Female<input type="radio" id="gender" name="custom">custom
        </div>
        <div class="row">
            <input type="text" placeholder="mobilenumber">
        </div>
        <div class="row">
            
        </div>
    
</div>

</body>
</html>
